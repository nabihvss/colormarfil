<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <title>Para: Vicente Colombo</title>
  </head>
  <body>
        <!-- 2. Container for the player -->
    <div id="container"></div>
    <script>
        // 3. Initialize Ruffle and load SWF
        window.addEventListener("load", (event) => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("container");
            container.appendChild(player);
            // Replace "your-file-name.swf" with your actual file path
            player.load({ url:"images/CM2.swf"}); 
        });
    </script>
    <style>
      body {
        background-color: pink;
      }
      #container {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      ruffle-player {
        width: 1080px;
        height: 720px;
      }
    </style>
  </body>
</html>
